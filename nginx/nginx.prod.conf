limit_req_zone $binary_remote_addr zone=api_limit:20m rate=10r/s;

server {
    listen 80;
    server_name chameleon-table.ddnsfree.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chameleon-table.ddnsfree.com;

    ssl_certificate /etc/letsencrypt/live/chameleon-table.ddnsfree.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chameleon-table.ddnsfree.com/privkey.pem;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}